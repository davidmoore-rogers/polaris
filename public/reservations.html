<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelob — Reservations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Reservations</h2>
        <div class="page-header-actions">
          <button class="btn btn-primary" id="btn-add-reservation">+ Add Reservation</button>
        </div>
      </div>

      <div class="filter-bar">
        <label>Status</label>
        <select id="filter-status" style="width:auto">
          <option value="">All</option>
          <option value="active">Active</option>
          <option value="expired">Expired</option>
          <option value="released">Released</option>
        </select>
        <label>Owner</label>
        <input type="text" id="filter-owner" placeholder="e.g. platform-team" style="width:160px">
        <label>Project</label>
        <input type="text" id="filter-project" placeholder="e.g. INFRA-001" style="width:140px">
        <label style="margin-left:auto">Show</label>
        <select id="filter-pagesize" style="width:auto">
          <option value="15" selected>15</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Network</th>
              <th>IP Address</th>
              <th>Hostname</th>
              <th>Owner</th>
              <th>Project</th>
              <th>Status</th>
              <th>Expires</th>
              <th>Created</th>
              <th style="width:110px">Actions</th>
            </tr>
          </thead>
          <tbody id="reservations-tbody">
            <tr><td colspan="9" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" style="display:flex;align-items:center;gap:12px;justify-content:center;padding:1rem 0"></div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/reservations.js"></script>
</body>
</html>
