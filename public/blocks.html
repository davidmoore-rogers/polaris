<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelob — IP Blocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="/logo.webp">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>IP Blocks</h2>
        <div class="page-header-actions">
          <button class="btn btn-primary" id="btn-add-block" data-admin-only>+ Add Block</button>
        </div>
      </div>

      <div class="filter-bar">
        <label>Version</label>
        <select id="filter-version" style="width:auto">
          <option value="">All</option>
          <option value="v4">IPv4</option>
          <option value="v6">IPv6</option>
        </select>
        <label>Tag</label>
        <input type="text" id="filter-tag" placeholder="e.g. prod" style="width:140px">
        <label style="margin-left:auto">Show</label>
        <select id="filter-pagesize" style="width:auto">
          <option value="15" selected>15</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>CIDR</th>
              <th>Version</th>
              <th>Description</th>
              <th>Tags</th>
              <th>Networks</th>
              <th>Created</th>
              <th style="width:90px">Actions</th>
            </tr>
          </thead>
          <tbody id="blocks-tbody">
            <tr><td colspan="8" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" style="display:flex;align-items:center;gap:12px;justify-content:center;padding:1rem 0"></div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/blocks.js"></script>
</body>
</html>
